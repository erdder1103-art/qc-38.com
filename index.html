<style>
body{margin:0;background:#000;font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial;}
.wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;}
.frame{position:relative;width:100%;max-width:420px;aspect-ratio:9/16;overflow:hidden;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.logo{position:absolute;top:-25%;left:50%;transform:translateX(-50%);width:100%;}
.ip{position:absolute;bottom:-10%;left:50%;transform:translateX(-50%);width:100%;}
.btnWrapper{position:absolute;bottom:-10%;left:50%;transform:translateX(-50%);width:80%;}
.btn{width:100%;cursor:pointer;display:block;animation:breath 1.8s ease-in-out infinite;}
@keyframes breath{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}

.tap{position:absolute;display:block;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tap-bg{inset:0;}
.tap-logo{top:-5%;left:50%;transform:translateX(-50%);width:60%;height:22%;}
.tap-ip{bottom:12%;left:50%;transform:translateX(-50%);width:90%;height:22%;}

<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager">
    <img src="assets/logo.png" class="logo" alt="" loading="eager">
    <img src="assets/ip.png" class="ip" alt="" loading="eager">

    <div class="btnWrapper">
      <a href="https://lin.ee/psmuO6O" class="goLine" data-area="btn" rel="noopener">
        <img src="assets/btn.png" class="btn" alt="" loading="eager">

    <a href="https://lin.ee/psmuO6O" class="goLine tap tap-bg" data-area="bg" rel="noopener" aria-label=""></a>
    <a href="https://lin.ee/psmuO6O" class="goLine tap tap-logo" data-area="logo" rel="noopener" aria-label=""></a>
    <a href="https://lin.ee/psmuO6O" class="goLine tap tap-ip" data-area="ip" rel="noopener" aria-label=""></a>
    <a href="https://lin.ee/psmuO6O" class="goLine tap tap-btn" data-area="btnOverlay" rel="noopener" aria-label=""></a>
  </div>
</div>

<script>
(function(){
  const LINE_URL = "https://lin.ee/psmuO6O";
  const REDIRECT_DELAY = 600;
  const PIXEL_ID = "1514005356965883";

  function uuidv4(){
    if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);return v.toString(16);
    });
  }

  let clicked = false;

  function fireEvents(area){
    const eventId = uuidv4();
    const opt = { eventID: eventId };
    const params = {
      action_source: "website",
      contact_method: "line",
      click_area: area || "unknown",
      event_source_url: window.location.href
    };

    try { fbq('trackSingle', PIXEL_ID, 'Contact', params, opt); } catch(e) {}
    try { fbq('trackSingleCustom', PIXEL_ID, 'LineClick', params, opt); } catch(e) {}
  }

  function go(){
    window.location.replace(LINE_URL);
  }

  const links = document.querySelectorAll('.goLine');
  links.forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      if(clicked) return;
      clicked = true;

      const area = a.getAttribute('data-area') || 'unknown';
      fireEvents(area);

      setTimeout(go, REDIRECT_DELAY);
    });
  });

  window.addEventListener('pageshow', function(){
    clicked = false;
  });
})();
</script>
</body>
