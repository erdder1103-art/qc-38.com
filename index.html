    <div class="btnWrapper">

         class="goLine"
         data-area="btn"
         rel="noopener"
         aria-label="加入 LINE">
        <img src="assets/btn.png" class="btn" alt="加入 LINE" loading="eager" decoding="async">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const LINE_URL = "https://lin.ee/psmuO6O";
  const PIXEL_ID = "1528071225365337";
  const REDIRECT_DELAY = 900;

  let clicked = false;

  function uuidv4(){
    if(window.crypto && typeof window.crypto.randomUUID === "function"){
      return window.crypto.randomUUID();
    }

    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){
      var r = Math.random() * 16 | 0;
      var v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  function firePixelEvents(area){
    if(typeof fbq !== "function") return;

    const commonParams = {
      action_source: "website",
      contact_method: "line",
      click_area: area || "btn",
      event_source_url: window.location.href
    };

    try{
      fbq(
        "trackSingle",
        PIXEL_ID,
        "Lead",
        commonParams,
        {eventID: uuidv4()}
      );
    }catch(e){}

    try{
      fbq(
        "trackSingle",
        PIXEL_ID,
        "Contact",
        commonParams,
        {eventID: uuidv4()}
      );
    }catch(e){}
  }

  function goLine(){
    window.location.href = LINE_URL;
  }

  const btn = document.querySelector(".goLine");

  if(btn){
    btn.addEventListener("click", function(e){
      e.preventDefault();

      if(clicked) return;
      clicked = true;

      const area = btn.getAttribute("data-area") || "btn";

      firePixelEvents(area);

      setTimeout(goLine, REDIRECT_DELAY);
    }, {passive:false});
  }

  window.addEventListener("pageshow", function(){
    clicked = false;
  });
})();
</script>
</body>
</html>
