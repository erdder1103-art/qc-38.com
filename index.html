<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>QC姐妹花</title>

<!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s){
  if(f.fbq)return;
  n=f.fbq=function(){
    n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments)
  };
  if(!f._fbq)f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s);
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init','1009089872010856');
fbq('track','PageView');
</script>

<noscript>
  <img height="1" width="1" style="display:none"
       src="https://www.facebook.com/tr?id=1009089872010856&ev=PageView&noscript=1"/>

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;
}

.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100svh;
  background:#000;
}

.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  pointer-events:none;
}

.logo{
  position:absolute;
  top:-12%;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  z-index:2;
  pointer-events:none;
}

.ip{
  position:absolute;
  bottom:12%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  z-index:2;
  pointer-events:none;
}

.btnWrapper{
  position:absolute;
  bottom:-20%;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  z-index:10;
}

.goLine{
  display:block;
  width:100%;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}

.btn{
  display:block;
  width:100%;
  height:auto;
  cursor:pointer;
  animation:breath 1.8s ease-in-out infinite;
  will-change:transform;
}

@keyframes breath{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager" decoding="async">
    <img src="assets/logo.png" class="logo" alt="" loading="eager" decoding="async">
    <img src="assets/ip.png" class="ip" alt="" loading="eager" decoding="async">

    <!-- 只有 btn.png 可以點擊並觸發完成註冊事件 -->
    <div class="btnWrapper">
      <a href="https://lin.ee/psmuO6O"
         class="goLine"
         data-area="btn"
         rel="noopener"
         aria-label="加入 LINE">
        <img src="assets/btn.png" class="btn" alt="加入 LINE" loading="eager" decoding="async">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  /* ===== 每次換活動只需要改這三項 ===== */
  const PIXEL_ID = "1009089872010856";
  const LINE_URL = "https://lin.ee/psmuO6O";
  const CAPI_ENDPOINT = "https://plain-leaf-f4f1.skype138388.workers.dev";
  /* =================================== */

  const EVENT_NAME = "CompleteRegistration";
  const REDIRECT_DELAY = 900;
  let clicked = false;

  function createEventId(){
    if(window.crypto && typeof window.crypto.randomUUID === "function"){
      return "reg_" + window.crypto.randomUUID();
    }
    return "reg_" + Date.now() + "_" + Math.random().toString(36).slice(2,12);
  }

  function getCookie(name){
    const prefix = name + "=";
    const parts = document.cookie ? document.cookie.split(";") : [];
    for(const part of parts){
      const item = part.trim();
      if(item.indexOf(prefix) === 0){
        return decodeURIComponent(item.substring(prefix.length));
      }
    }
    return "";
  }

  function getFbc(){
    const existing = getCookie("_fbc");
    if(existing) return existing;

    const fbclid = new URLSearchParams(window.location.search).get("fbclid");
    if(!fbclid) return "";
    return "fb.1." + Date.now() + "." + fbclid;
  }

  function fireBrowserEvent(eventId, area){
    if(typeof fbq !== "function") return;

    try{
      fbq(
        "trackSingle",
        PIXEL_ID,
        EVENT_NAME,
        {
          contact_method: "line",
          click_area: area || "btn"
        },
        {eventID:eventId}
      );
    }catch(err){
      console.warn("Browser Pixel 送出失敗", err);
    }
  }

  function fireServerEvent(eventId, area){
    if(!CAPI_ENDPOINT || CAPI_ENDPOINT.includes("你的-worker")){
      return Promise.resolve();
    }

    return fetch(CAPI_ENDPOINT, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      keepalive:true,
      body:JSON.stringify({
        pixel_id:PIXEL_ID,
        event_name:EVENT_NAME,
        event_id:eventId,
        event_source_url:window.location.href,
        fbp:getCookie("_fbp"),
        fbc:getFbc(),
        click_area:area || "btn"
      })
    }).catch(function(err){
      console.warn("CAPI 送出失敗", err);
    });
  }

  function goLine(){
    window.location.href = LINE_URL;
  }

  const btn = document.querySelector(".goLine");
  if(btn){
    btn.setAttribute("href", LINE_URL);

    btn.addEventListener("click", function(e){
      e.preventDefault();
      if(clicked) return;
      clicked = true;

      const area = btn.getAttribute("data-area") || "btn";
      const eventId = createEventId();

      fireBrowserEvent(eventId, area);
      fireServerEvent(eventId, area);

      setTimeout(goLine, REDIRECT_DELAY);
    }, {passive:false});
  }

  window.addEventListener("pageshow", function(){
    clicked = false;
  });
})();
</script>
</body>
</html>
