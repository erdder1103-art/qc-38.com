<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QC38姐妹花-註冊送10000-1:100</title>

<script>
window.APP_CONFIG = {
  PIXEL_ID: '1324377242868914',
  SECOND_PIXEL_ID: '3404233333080819',
  LINE_URL: 'https://lin.ee/psmuO6O',
  REDIRECT_DELAY: 800
};

!function(f,b,e,v,n,t,s){
  if(f.fbq)return;
  n=f.fbq=function(){
    n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
  };
  if(!f._fbq)f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s);
}(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', window.APP_CONFIG.PIXEL_ID);

fbq('set', 'autoConfig', false, window.APP_CONFIG.SECOND_PIXEL_ID);
fbq('init', window.APP_CONFIG.SECOND_PIXEL_ID);

fbq('trackSingle', window.APP_CONFIG.PIXEL_ID, 'PageView');
fbq('trackSingle', window.APP_CONFIG.SECOND_PIXEL_ID, 'PageView');
</script>

<noscript>
  <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1324377242868914&ev=PageView&noscript=1"/>
</noscript>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;font-family:system-ui;}
.wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;}
.frame{position:relative;width:100%;max-width:420px;aspect-ratio:9/16;overflow:hidden;background:#000;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.logo{position:absolute;top:-25%;left:50%;transform:translateX(-50%);width:100%;}
.ip{position:absolute;bottom:-10%;left:50%;transform:translateX(-50%);width:100%;}
.btnWrapper{position:absolute;bottom:-10%;left:50%;transform:translateX(-50%);width:80%;}
.goLine{display:block;width:100%;}
.btn{width:100%;animation:breath 1.8s infinite;}
@keyframes breath{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg">
    <img src="assets/logo.png" class="logo">
    <img src="assets/ip.png" class="ip">

    <div class="btnWrapper">
      <a href="https://lin.ee/psmuO6O" class="goLine" data-area="main_cta">
        <img src="assets/btn.png" class="btn">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  var MAIN_PIXEL_ID = window.APP_CONFIG.PIXEL_ID;
  var LINE_URL = window.APP_CONFIG.LINE_URL;
  var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;
  var clicked = false;

  function uuid(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  function fireEvents(area){
    var params = {
      content_name:'line_contact_click',
      content_category:'line_redirect',
      contact_method:'line',
      click_area:area || 'main_cta',
      destination:'official_line'
    };

    fbq('trackSingle', MAIN_PIXEL_ID, 'Contact', params, {eventID:'c_'+uuid()});
    fbq('trackSingle', MAIN_PIXEL_ID, 'Lead', params, {eventID:'l_'+uuid()});
    fbq('trackSingleCustom', MAIN_PIXEL_ID, 'LineClick', params, {eventID:'lc_'+uuid()});
  }

  function handleClick(e){
    e.preventDefault();
    if(clicked) return;
    clicked = true;

    fireEvents(this.dataset.area);

    setTimeout(function(){
      window.location.href = LINE_URL;
    }, REDIRECT_DELAY);
  }

  document.querySelectorAll('.goLine').forEach(function(el){
    el.addEventListener('click', handleClick, { passive:false });
  });

})();
</script>

</body>
</html>
